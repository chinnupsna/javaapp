name: Explore GitHub Components

on: workflow_dispatch

jobs:
  build:
    name: Build job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display runner info
        run: |
          echo "Running on: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          echo "workspace: $GITHUB_WORKSPACE"
          echo "repository: $GITHUB_REPOSITORY" 
          echo "event name: $GITHUB_EVENT_NAME"
          echo "sha: $GITHUB_SHA"

      - name: List installed tools
        run: |
          echo "=== Java ==="
          java -version 2>&1 || echo 'Not installed'
          echo "=== Node ==="
          node --version || echo 'Not installed'
          echo "=== Python ==="
          python3 --version || echo 'Not installed'
          echo "=== Docker ==="
          docker --version || echo 'Not installed'
  
  test-job:
    name: Test job
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run tests
        run: echo "Running tests..."

  notify:
    name: Notify job
    runs-on: ubuntu-latest
    needs: [build, test-job]
    if: always() # Ensure this runs even if previous jobs fail
    steps:
      - name: Send notification
        run: echo "Tests completed. Sending notification..."      