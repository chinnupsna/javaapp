name: Dynamic Runner

on: workflow_dispatch

jobs:
  build:
    env:
      APP_TYPE: java   # change to 'dotnet' to run on Windows   
    runs-on: ${{ env.APP_TYPE == 'java' && 'ubuntu-latest' || 'windows-latest' }}

    steps:
      - name: Show runner
        run: echo "Running on $RUNNER_OS"